<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SahayakAI</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
      <div class="container">
        <a class="navbar-brand fw-bold" href="#"> 🇮🇳 SahayakAI </a>
      </div>
    </nav>

    <!-- Hero Section -->
    <section class="container text-center py-5">
      <h1 class="display-4 fw-bold text-primary">
        AI Powered Government Scheme Finder
      </h1>

      <p class="lead text-muted mt-3">
        Find government schemes you are eligible for in just a few clicks.
      </p>
    </section>

    <!-- User Profile Card -->
    <div class="container mb-4">
      <div class="card shadow">
        <div class="card-body">
          <h3 class="card-title mb-4">User Profile</h3>
          <form id="eligibilityForm">
            <div class="row">
              <!-- Age -->
              <div class="col-md-6 mb-3">
                <label for="age" class="form-label"> Age </label>

                <input
                  type="number"
                  class="form-control"
                  id="age"
                  name="age"
                  placeholder="Enter your age"
                  min="0"
                  max="120"
                  required
                />
              </div>

              <!-- Income -->
              <div class="col-md-6 mb-3">
                <label for="income" class="form-label">
                  Annual Income (₹)
                </label>

                <input
                  type="number"
                  class="form-control"
                  id="income"
                  name="income"
                  placeholder="Enter annual income"
                  min="0"
                  required
                />
              </div>
            </div>
            <div class="row">
              <!-- Gender -->
              <div class="col-md-6 mb-3">
                <label for="gender" class="form-label"> Gender </label>

                <select class="form-select" id="gender" name="gender" required>
                  <option value="">Select Gender</option>
                  <option value="male">Male</option>
                  <option value="female">Female</option>
                  <option value="other">Other</option>
                </select>
              </div>

              <!-- State -->
              <div class="col-md-6 mb-3">
                <label for="state" class="form-label"> State </label>

                <select class="form-select" id="state" name="state" required>
                  <option value="">Select State</option>
                  <option value="telangana">Telangana</option>
                  <option value="andhra pradesh">Andhra Pradesh</option>
                  <option value="karnataka">Karnataka</option>
                  <option value="tamil nadu">Tamil Nadu</option>
                  <option value="kerala">Kerala</option>
                  <option value="maharashtra">Maharashtra</option>
                  <option value="other">Other</option>
                </select>
              </div>
            </div>
            <div class="row">
              <!-- Occupation -->
              <div class="col-md-6 mb-3">
                <label for="occupation" class="form-label"> Occupation </label>

                <select
                  class="form-select"
                  id="occupation"
                  name="occupation"
                  required
                >
                  <option value="">Select Occupation</option>
                  <option value="student">Student</option>
                  <option value="farmer">Farmer</option>
                  <option value="business">Business</option>
                  <option value="street vendor">Street Vendor</option>
                  <option value="government employee">
                    Government Employee
                  </option>
                  <option value="private employee">Private Employee</option>
                  <option value="self employed">Self Employed</option>
                  <option value="unemployed">Unemployed</option>
                  <option value="other">Other</option>
                </select>
              </div>

              <!-- Student -->
              <div class="col-md-6 mb-3">
                <label for="student" class="form-label">
                  Are you a Student?
                </label>

                <select
                  class="form-select"
                  id="student"
                  name="student"
                  required
                >
                  <option value="">Select</option>
                  <option value="1">Yes</option>
                  <option value="0">No</option>
                </select>
              </div>
            </div>
            <div class="row">
              <!-- Farmer -->
              <div class="col-md-6 mb-3">
                <label for="farmer" class="form-label">
                  Are you a Farmer?
                </label>

                <select class="form-select" id="farmer" name="farmer" required>
                  <option value="">Select</option>
                  <option value="1">Yes</option>
                  <option value="0">No</option>
                </select>
              </div>

              <!-- Disability -->
              <div class="col-md-6 mb-3">
                <label for="disability" class="form-label">
                  Person with Disability?
                </label>

                <select
                  class="form-select"
                  id="disability"
                  name="disability"
                  required
                >
                  <option value="">Select</option>
                  <option value="1">Yes</option>
                  <option value="0">No</option>
                </select>
              </div>
            </div>
            <div class="text-center mt-4">
              <button
                type="submit"
                id="checkBtn"
                class="btn btn-primary btn-lg px-5"
              >
                <span
                  id="loader"
                  class="spinner-border spinner-border-sm me-2 d-none"
                  role="status"
                  aria-hidden="true"
                ></span>

                <span id="buttonText">Check Eligibility</span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Eligible Schemes Card -->
    <div class="container mt-4">
      <div class="card shadow">
        <div class="card-body">
          <h3 class="card-title mb-3">Eligible Government Schemes</h3>

          <div id="schemeResults">
            <p class="text-muted mb-0">
              Your eligible schemes will appear here after checking eligibility.
            </p>
          </div>
        </div>
      </div>
    </div>

    <!-- AI Recommendation Card-->
    <div class="container mt-4 mb-5">
      <div class="card shadow">
        <div class="card-body">
          <h3 class="card-title mb-3">AI Recommendation</h3>

          <div id="aiRecommendation">
            <p class="text-muted mb-0">
              AI-generated recommendations will appear here.
            </p>
          </div>
        </div>
      </div>
    </div>

    <div class="text-center mt-3 mb-5">
      <button type="button" id="downloadPdfBtn" class="btn btn-success d-none">
        <i class="bi bi-file-earmark-pdf"></i>
        Download PDF
      </button>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Marked JS -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Custom JS -->
    <script src="js/app.js"></script>
  </body>
</html>
